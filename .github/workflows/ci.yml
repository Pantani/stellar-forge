name: CI

on:
  pull_request:
  push:
  workflow_dispatch:
  schedule:
    - cron: "23 5 * * 1"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  quality:
    name: Quality gates
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component clippy --component rustfmt

      - name: Set stable toolchain as default
        run: rustup default stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Check compilation
        run: cargo check --locked --all-targets --all-features

      - name: Run clippy
        run: cargo clippy --locked --workspace --all-targets --all-features -- -D warnings

      - name: Run tests
        run: cargo test --locked

  generated-frontend-smoke:
    name: Generated frontend smoke
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Set stable toolchain as default
        run: rustup default stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Enable corepack
        run: corepack enable

      - name: Build CLI
        run: cargo build --locked

      - name: Run generated frontend smoke runner
        run: |
          temp_dir="$(mktemp -d)"
          cd "$temp_dir"
          "$GITHUB_WORKSPACE/target/debug/stellar-forge" init demo --template fullstack
          pnpm --dir demo/apps/web install --reporter=silent
          pnpm --dir demo/apps/web smoke:ui

  security:
    name: Security audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Set stable toolchain as default
        run: rustup default stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit
